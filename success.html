<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You're confirmed — Life Thru Food</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Space+Grotesk:wght@300;400;500&family=Fragment+Mono&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'EB Garamond', serif; background: #F3F0E8; color: #1E1C16; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; -webkit-font-smoothing: antialiased; }
.wrap { max-width: 520px; width: 100%; text-align: center; }
.mono { font-family: 'Fragment Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: #47553F; opacity: 0.8; margin-bottom: 2.5rem; }
h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 300; font-size: clamp(2rem, 6vw, 3.5rem); line-height: 1.0; letter-spacing: -0.04em; color: #1E1C16; margin-bottom: 1rem; }
h1 em { font-family: 'EB Garamond', serif; font-style: italic; font-weight: 400; font-size: 0.7em; display: block; color: rgba(30,26,20,0.5); margin-top: 0.3em; letter-spacing: 0.01em; }
p { font-size: 1rem; font-style: italic; color: rgba(30,26,20,0.6); line-height: 1.8; margin-bottom: 2.5rem; }
a { font-family: 'Fragment Mono', monospace; font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: #47553F; text-decoration: none; border-bottom: 1px solid rgba(71,85,63,0.3); padding-bottom: 2px; transition: border-color 0.2s; }
a:hover { border-color: #47553F; }
.divider { width: 40px; height: 1px; background: rgba(30,26,20,0.15); margin: 0 auto 2.5rem; }
</style>
</head>
<body>
<div class="wrap">
  <p class="mono">Life Thru Food &nbsp;·&nbsp; New York City</p>
  <div class="divider"></div>
  <h1>You're in.<em>See you at the table.</em></h1>
  <p>Your payment is confirmed and your seat is reserved. A confirmation email is on its way. The address will be shared one week before the dinner.</p>
  <a href="/">back to lifethrufood.com</a>
</div>
</body>
</html>
